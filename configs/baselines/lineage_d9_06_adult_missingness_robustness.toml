[calibration]
top_k = 2
selection_metric = "validation_auroc"
tie_break = "validation_ece"
methods = ["sigmoid", "isotonic"]
fit_split = "validation"

[[baseline]]
name = "lightgbm"
family = "boosted_trees"
handles_categorical = true
implementation = "lightgbm.LGBMClassifier"
uses_validation_split = true
n_estimators = 1000
learning_rate = 0.05
num_leaves = 31
subsample = 0.8
colsample_bytree = 0.8
early_stopping_rounds = 50

[[baseline]]
name = "catboost"
family = "boosted_trees"
handles_categorical = true
implementation = "catboost.CatBoostClassifier"
uses_validation_split = true
iterations = 1000
learning_rate = 0.05
depth = 6
l2_leaf_reg = 3.0
early_stopping_rounds = 50

[[baseline]]
name = "logistic_regression"
family = "linear"
handles_categorical = false
implementation = "sklearn.linear_model.LogisticRegression"
uses_validation_split = false
max_iter = 1000
solver = "lbfgs"
C = 1.0

[[baseline]]
name = "random_forest"
family = "bagged_trees"
handles_categorical = false
implementation = "sklearn.ensemble.RandomForestClassifier"
uses_validation_split = false
n_estimators = 300
max_depth = 20
min_samples_leaf = 2
max_features = "sqrt"

[[baseline]]
name = "xgboost"
family = "boosted_trees"
handles_categorical = false
implementation = "xgboost.XGBClassifier"
uses_validation_split = false
n_estimators = 400
max_depth = 6
learning_rate = 0.05
subsample = 0.8
colsample_bytree = 0.8
